<svg width="280" height="340" viewBox="0 0 280 340" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- WonderLens — Stacked Logo Lockup (violet on transparent, for light backgrounds) -->
  <!-- ─── Mark (centred, top) ─── -->
  <g transform="translate(40, 10)">
    <circle cx="100" cy="100" r="82" stroke="#5B3FD4" stroke-width="9"/>
    <line x1="100" y1="22" x2="100" y2="70" stroke="#5B3FD4" stroke-width="6" stroke-linecap="round"/>
    <line x1="100" y1="130" x2="100" y2="178" stroke="#5B3FD4" stroke-width="6" stroke-linecap="round"/>
    <line x1="22"  y1="100" x2="70"  y2="100" stroke="#5B3FD4" stroke-width="6" stroke-linecap="round"/>
    <line x1="130" y1="100" x2="178" y2="100" stroke="#5B3FD4" stroke-width="6" stroke-linecap="round"/>
    <circle cx="100" cy="100" r="13" fill="#F5A623"/>
  </g>
  <!-- ─── Wordmark ─── -->
  <!-- "Wonder" in violet, "Lens" in amber — Nunito ExtraBold -->
  <text x="140" y="250" text-anchor="middle"
        font-family="Nunito, 'Nunito Sans', Helvetica Neue, Arial, sans-serif"
        font-weight="800" font-size="38" letter-spacing="-0.5">
    <tspan fill="#5B3FD4">Wonder</tspan><tspan fill="#F5A623">Lens</tspan>
  </text>
  <!-- ─── Tagline ─── -->
  <text x="140" y="278" text-anchor="middle"
        font-family="Nunito, 'Nunito Sans', Helvetica Neue, Arial, sans-serif"
        font-weight="600" font-size="14" fill="#7B6BA0" letter-spacing="0.2">
    See how things work
  </text>
  <!-- ─── Attribution ─── -->
  <text x="140" y="300" text-anchor="middle"
        font-family="Nunito, 'Nunito Sans', Helvetica Neue, Arial, sans-serif"
        font-weight="600" font-size="11" fill="#C4B5D0" letter-spacing="0.5">
    by Visiant
  </text>
</svg>
