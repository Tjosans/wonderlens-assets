<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- WonderLens Logo Mark — White variant (use on dark/splash gradient backgrounds) -->
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="82" stroke="#FFFFFF" stroke-width="9"/>
  <!-- Crosshair arms -->
  <line x1="100" y1="22" x2="100" y2="70" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>
  <line x1="100" y1="130" x2="100" y2="178" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>
  <line x1="22"  y1="100" x2="70"  y2="100" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>
  <line x1="130" y1="100" x2="178" y2="100" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>
  <!-- Amber centre dot -->
  <circle cx="100" cy="100" r="13" fill="#F5A623"/>
</svg>
